apiVersion: v1
kind: ConfigMap
metadata:
  name: gic-plateforme-config
  namespace: default # Assure-toi que c'est le même namespace que ton Pod
data:
  DEBUG: "False"
  EMAIL_HOST: "smtp.gmail.com"
  EMAIL_PORT: "587"
  EMAIL_USE_TLS: "True"
  TIME_ZONE: "Africa/Douala" 
  EMAIL_BACKEND: "django.core.mail.backends.smtp.EmailBackend" 
  ALLOWED_HOSTS: "*"
  SHOW_PUBLIC_IF_NO_TENANT_FOUND: "True"
  SECURE_SSL_REDIRECT: "False"
  SESSION_COOKIE_SECURE: "False"
  CSRF_COOKIE_SECURE: "False" 
  CSRF_TRUSTED_ORIGINS: "http://127.0.0.1:8000,http://localhost:8000,http://gic-finance-30.globalitcorporation.com"
  # On laisse vide pour le local
  CSRF_COOKIE_DOMAIN: "" 

  AFPAY_INIT_BASE_URL : 'https://poly-h.net/'
  AFPAY_BASE_URL   : 'https://poly-h.net/api-afpay-gateway/' 
  AFPAY_API_ACCOUNT_USERNAME : 'globalitcapi' 
  STATIC_ROOT: "/app/staticfiles"