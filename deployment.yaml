apiVersion: apps/v1
kind: Deployment
metadata:
  name: gic-plateforme-deployment
  labels:
    app: gic-plateforme
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gic-plateforme
  template:
    metadata:
      labels:
        app: gic-plateforme
    spec:
      containers:
      - name: gic-plateforme-container
        image: david5831/gic-plateforme:f9611a5feec4fee7664f53f9d3826c78281a0931
        ports:
        - containerPort: 8000
        command: ["python"]
        args: ["manage.py", "runserver", "0.0.0.0:8000"]
        envFrom:
          - configMapRef:
              name: gic-plateforme-config
          - secretRef:
              name: gic-plateforme-secret